<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>MP19-7MF-SK6812-EVB Client</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MP19-7MF-SK6812-EVB Client</h1>
            <div class="connection-status">
                <span id="status" class="status-disconnected">● Disconnected</span>
                <button id="connectBtn" class="btn btn-primary">Connect Device</button>
                <button id="disconnectBtn" class="btn btn-secondary" disabled>Disconnect</button>
            </div>
        </header>

        <main>
            <!-- Pixel 1 Panel -->
            <section class="section color-section">
                <h2>Pixel 1</h2>
                
                <div class="color-preview" id="preview1"></div>

                <div class="control-group">
                    <div class="slider-group">
                        <label>
                            <span>Red</span>
                            <span id="p1-r-val">0</span>
                        </label>
                        <input type="range" id="p1-r-slider" min="0" max="255" value="0" class="slider">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Green</span>
                            <span id="p1-g-val">0</span>
                        </label>
                        <input type="range" id="p1-g-slider" min="0" max="255" value="0" class="slider">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Blue</span>
                            <span id="p1-b-val">0</span>
                        </label>
                        <input type="range" id="p1-b-slider" min="0" max="255" value="0" class="slider">
                    </div>
                </div>

                <div class="control-group">
                    <label>Brightness</label>
                    <div class="slider-group">
                        <label style="flex-direction: row; justify-content: space-between;">
                            <span>Brightness</span>
                            <span id="p1-brightness-val">100%</span>
                        </label>
                        <input type="range" id="p1-brightness" min="0" max="100" value="100" class="slider brightness-slider">
                    </div>
                </div>

                <input type="color" id="p1-color" class="color-picker" value="#000000">
            </section>

            <!-- Pixel 2 Panel -->
            <section class="section color-section">
                <h2>Pixel 2</h2>
                
                <div class="color-preview" id="preview2"></div>

                <div class="control-group">
                    <div class="slider-group">
                        <label>
                            <span>Red</span>
                            <span id="p2-r-val">0</span>
                        </label>
                        <input type="range" id="p2-r-slider" min="0" max="255" value="0" class="slider">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Green</span>
                            <span id="p2-g-val">0</span>
                        </label>
                        <input type="range" id="p2-g-slider" min="0" max="255" value="0" class="slider">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Blue</span>
                            <span id="p2-b-val">0</span>
                        </label>
                        <input type="range" id="p2-b-slider" min="0" max="255" value="0" class="slider">
                    </div>
                </div>

                <div class="control-group">
                    <label>Brightness</label>
                    <div class="slider-group">
                        <label style="flex-direction: row; justify-content: space-between;">
                            <span>Brightness</span>
                            <span id="p2-brightness-val">100%</span>
                        </label>
                        <input type="range" id="p2-brightness" min="0" max="100" value="100" class="slider brightness-slider">
                    </div>
                </div>

                <input type="color" id="p2-color" class="color-picker" value="#000000">
            </section>

            <!-- Pixel 3 Panel -->
            <section class="section color-section">
                <h2>Pixel 3</h2>
                
                <div class="color-preview" id="preview3"></div>

                <div class="control-group">
                    <div class="slider-group">
                        <label>
                            <span>Red</span>
                            <span id="p3-r-val">0</span>
                        </label>
                        <input type="range" id="p3-r-slider" min="0" max="255" value="0" class="slider">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Green</span>
                            <span id="p3-g-val">0</span>
                        </label>
                        <input type="range" id="p3-g-slider" min="0" max="255" value="0" class="slider">
                    </div>
                    <div class="slider-group">
                        <label>
                            <span>Blue</span>
                            <span id="p3-b-val">0</span>
                        </label>
                        <input type="range" id="p3-b-slider" min="0" max="255" value="0" class="slider">
                    </div>
                </div>

                <div class="control-group">
                    <label>Brightness</label>
                    <div class="slider-group">
                        <label style="flex-direction: row; justify-content: space-between;">
                            <span>Brightness</span>
                            <span id="p3-brightness-val">100%</span>
                        </label>
                        <input type="range" id="p3-brightness" min="0" max="100" value="100" class="slider brightness-slider">
                    </div>
                </div>

                <input type="color" id="p3-color" class="color-picker" value="#000000">
            </section>
        </main>

        <!-- Status Panel -->
        <section class="section status-section">
            <h2>Button Status & Debug</h2>
            <div class="status-row">
                <div class="button-status">
                    <h3>Button 1</h3>
                    <div id="btn1-status" class="status-indicator released">Released</div>
                </div>
                <div class="button-status">
                    <h3>Button 2</h3>
                    <div id="btn2-status" class="status-indicator released">Released</div>
                </div>
                <div class="button-status">
                    <h3>Button 3</h3>
                    <div id="btn3-status" class="status-indicator released">Released</div>
                </div>
            </div>

            <div class="debug-panel">
                <p><strong>TX:</strong> <span id="debug-tx">-</span></p>
                <p><strong>RX:</strong> <span id="debug-rx">-</span></p>
                <p id="debug-msg">Initialized...</p>
            </div>
        </section>
    </div>
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left">
